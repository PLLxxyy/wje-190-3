<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D 家居户型设计</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif; background: #1a1a2e; color: #e0e0e0; }

      .app-layout { display: flex; flex-direction: column; width: 100%; height: 100%; }

      /* ===== 顶部工具栏 ===== */
      .toolbar { display: flex; align-items: center; justify-content: space-between; height: 52px; padding: 0 16px; background: linear-gradient(135deg, #16213e 0%, #1a1a2e 100%); border-bottom: 1px solid #2a2a4a; flex-shrink: 0; z-index: 100; }
      .toolbar-left { display: flex; align-items: center; gap: 12px; }
      .toolbar-title { font-size: 16px; font-weight: 600; color: #7ec8e3; letter-spacing: 1px; }
      .toolbar-rooms { display: flex; gap: 4px; }
      .room-btn { padding: 6px 16px; border: 1px solid #3a3a5c; border-radius: 6px; background: transparent; color: #b0b0d0; cursor: pointer; font-size: 13px; transition: all 0.2s; }
      .room-btn:hover { border-color: #7ec8e3; color: #7ec8e3; }
      .room-btn.active { background: #7ec8e3; color: #1a1a2e; border-color: #7ec8e3; font-weight: 600; }
      .toolbar-right { display: flex; align-items: center; gap: 8px; }
      .style-btn { padding: 6px 14px; border: 1px solid #3a3a5c; border-radius: 6px; background: transparent; color: #b0b0d0; cursor: pointer; font-size: 12px; transition: all 0.2s; }
      .style-btn:hover { border-color: #f0a500; color: #f0a500; }
      .style-btn.active { background: #f0a500; color: #1a1a2e; border-color: #f0a500; font-weight: 600; }
      .save-btn, .load-btn { padding: 6px 14px; border: 1px solid #4caf50; border-radius: 6px; background: transparent; color: #4caf50; cursor: pointer; font-size: 12px; transition: all 0.2s; }
      .save-btn:hover, .load-btn:hover { background: #4caf50; color: #1a1a2e; }
      .view-btn { padding: 6px 12px; border: 1px solid #9c27b0; border-radius: 6px; background: transparent; color: #ce93d8; cursor: pointer; font-size: 12px; transition: all 0.2s; }
      .view-btn:hover { background: #9c27b0; color: #fff; }
      .view-btn.active { background: #9c27b0; color: #fff; border-color: #9c27b0; }

      /* ===== 主体区域 ===== */
      .main-area { display: flex; flex: 1; overflow: hidden; position: relative; }

      /* ===== 左侧家具列表 ===== */
      .sidebar { width: 200px; background: #16213e; border-right: 1px solid #2a2a4a; display: flex; flex-direction: column; flex-shrink: 0; z-index: 10; overflow-y: auto; }
      .sidebar-header { padding: 12px 14px; font-size: 14px; font-weight: 600; color: #7ec8e3; border-bottom: 1px solid #2a2a4a; }
      .category-title { padding: 10px 14px 4px; font-size: 11px; color: #6a6a8a; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
      .furniture-item { display: flex; align-items: center; gap: 10px; padding: 8px 14px; cursor: grab; transition: background 0.15s; border-left: 3px solid transparent; }
      .furniture-item:hover { background: #1f2b4d; border-left-color: #7ec8e3; }
      .furniture-item:active { cursor: grabbing; }
      .furniture-icon { width: 36px; height: 36px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
      .furniture-info { display: flex; flex-direction: column; }
      .furniture-name { font-size: 13px; color: #d0d0e8; font-weight: 500; }
      .furniture-size { font-size: 10px; color: #6a6a8a; margin-top: 2px; }

      .divider { height: 1px; background: #2a2a4a; margin: 8px 14px; }

      .presets-section { padding: 0 0 4px; }
      .presets-section .category-title { display: flex; align-items: center; justify-content: space-between; }
      .clear-btn { padding: 3px 10px; border: 1px solid #e53935; border-radius: 4px; background: transparent; color: #e53935; cursor: pointer; font-size: 11px; transition: all 0.15s; }
      .clear-btn:hover { background: #e53935; color: #fff; }
      .presets-grid { display: flex; flex-direction: column; gap: 6px; padding: 4px 14px 8px; }
      .preset-card { display: flex; align-items: center; gap: 10px; padding: 10px; border: 1px solid #2a2a4a; border-radius: 8px; background: #1a2545; cursor: pointer; transition: all 0.2s; }
      .preset-card:hover { border-color: #7ec8e3; background: #1f2b4d; transform: translateY(-1px); box-shadow: 0 2px 8px rgba(126,200,227,0.15); }
      .preset-card:active { transform: translateY(0); }
      .preset-thumbnail { width: 40px; height: 40px; border-radius: 8px; background: linear-gradient(135deg, #2a3a6a 0%, #1a2545 100%); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
      .preset-info { display: flex; flex-direction: column; flex: 1; min-width: 0; }
      .preset-name { font-size: 13px; color: #d0d0e8; font-weight: 600; }
      .preset-desc { font-size: 11px; color: #8080a0; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .preset-count { font-size: 10px; color: #7ec8e3; margin-top: 4px; font-weight: 500; }

      /* ===== 3D画布 ===== */
      .canvas-container { flex: 1; position: relative; }
      .canvas-container canvas { display: block; }
      .drop-hint { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #4a4a6a; font-size: 14px; pointer-events: none; opacity: 0.5; }

      /* ===== 右侧属性面板 ===== */
      .property-panel { width: 240px; background: #16213e; border-left: 1px solid #2a2a4a; display: flex; flex-direction: column; flex-shrink: 0; z-index: 10; overflow-y: auto; }
      .panel-header { padding: 12px 14px; font-size: 14px; font-weight: 600; color: #7ec8e3; border-bottom: 1px solid #2a2a4a; }
      .panel-section { padding: 12px 14px; border-bottom: 1px solid #2a2a4a; }
      .panel-section-title { font-size: 11px; color: #6a6a8a; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; font-weight: 600; }
      .prop-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
      .prop-label { font-size: 12px; color: #9090b0; }
      .prop-value { font-size: 12px; color: #d0d0e8; font-weight: 500; }
      .color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: 6px; }
      .color-swatch { width: 32px; height: 32px; border-radius: 6px; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
      .color-swatch:hover { transform: scale(1.15); }
      .color-swatch.active { border-color: #fff; box-shadow: 0 0 8px rgba(126,200,227,0.5); }
      .material-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; margin-top: 6px; }
      .material-btn { padding: 6px 8px; border: 1px solid #3a3a5c; border-radius: 4px; background: transparent; color: #b0b0d0; cursor: pointer; font-size: 11px; transition: all 0.15s; text-align: center; }
      .material-btn:hover { border-color: #7ec8e3; color: #7ec8e3; }
      .material-btn.active { background: #7ec8e3; color: #1a1a2e; border-color: #7ec8e3; }
      .rotate-control { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
      .rotate-btn { width: 28px; height: 28px; border: 1px solid #3a3a5c; border-radius: 4px; background: transparent; color: #b0b0d0; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
      .rotate-btn:hover { border-color: #7ec8e3; color: #7ec8e3; }
      .delete-btn { width: 100%; padding: 8px; border: 1px solid #e53935; border-radius: 6px; background: transparent; color: #e53935; cursor: pointer; font-size: 13px; transition: all 0.2s; margin-top: 8px; }
      .delete-btn:hover { background: #e53935; color: #fff; }
      .empty-hint { padding: 20px 14px; color: #4a4a6a; font-size: 12px; text-align: center; line-height: 1.6; }

      /* ===== 方案列表 ===== */
      .scheme-list { padding: 8px 14px; }
      .scheme-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px; border: 1px solid #2a2a4a; border-radius: 6px; margin-bottom: 4px; cursor: pointer; transition: all 0.15s; }
      .scheme-item:hover { border-color: #7ec8e3; }
      .scheme-item.active { border-color: #7ec8e3; background: rgba(126,200,227,0.1); }
      .scheme-name { font-size: 12px; color: #d0d0e8; }
      .scheme-delete { width: 20px; height: 20px; border: none; background: transparent; color: #e53935; cursor: pointer; font-size: 14px; border-radius: 3px; display: flex; align-items: center; justify-content: center; }
      .scheme-delete:hover { background: rgba(229,57,53,0.2); }
      .new-scheme-btn { width: 100%; padding: 8px; border: 1px dashed #3a3a5c; border-radius: 6px; background: transparent; color: #6a6a8a; cursor: pointer; font-size: 12px; transition: all 0.2s; }
      .new-scheme-btn:hover { border-color: #7ec8e3; color: #7ec8e3; }

      /* ===== 方案名输入弹窗 ===== */
      .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; }
      .modal-box { background: #1e2a4a; border: 1px solid #3a3a5c; border-radius: 10px; padding: 20px; width: 300px; }
      .modal-title { font-size: 15px; font-weight: 600; color: #7ec8e3; margin-bottom: 12px; }
      .modal-input { width: 100%; padding: 8px 12px; border: 1px solid #3a3a5c; border-radius: 6px; background: #0f1729; color: #d0d0e8; font-size: 13px; outline: none; margin-bottom: 12px; }
      .modal-input:focus { border-color: #7ec8e3; }
      .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
      .modal-cancel { padding: 6px 16px; border: 1px solid #3a3a5c; border-radius: 6px; background: transparent; color: #9090b0; cursor: pointer; font-size: 12px; }
      .modal-confirm { padding: 6px 16px; border: none; border-radius: 6px; background: #7ec8e3; color: #1a1a2e; cursor: pointer; font-size: 12px; font-weight: 600; }

      /* ===== 信息提示 ===== */
      .toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); padding: 8px 20px; background: #2a4a2a; border: 1px solid #4caf50; color: #a5d6a7; border-radius: 6px; font-size: 13px; z-index: 2000; animation: fadeInOut 2s ease; pointer-events: none; }
      @keyframes fadeInOut { 0% { opacity: 0; transform: translateX(-50%) translateY(-10px); } 15% { opacity: 1; transform: translateX(-50%) translateY(0); } 85% { opacity: 1; } 100% { opacity: 0; } }

      /* ===== 滚动条美化 ===== */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #3a3a5c; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
